name: Boatrace AI Daily

on:
  schedule:
    - cron: '30 22 * * *'   # morning (7:30 JST)
    - cron: '0 4 * * *'     # midday (13:00 JST)
    - cron: '30 12 * * *'   # evening (21:30 JST)
    - cron: '0 15 * * 0'    # weekly report (Sunday 0:00 JST)
    - cron: '0 18 * * 6'    # weekly train (Saturday 3:00 JST)
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        type: choice
        options:
          - morning
          - midday
          - evening
          - weekly-report
          - train

env:
  BOATRACE_DB_PATH: ${{ github.workspace }}/.boatrace-data/boatrace.db
  BOATRACE_MODEL_PATH: ${{ github.workspace }}/.boatrace-data/model.lgb
  BOATRACE_EV_MIN: '0.30'

jobs:
  morning:
    if: >-
      github.event.schedule == '30 22 * * *' ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'morning')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[ml]"
          pip install playwright
          playwright install chromium --with-deps

      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: .boatrace-data
          key: boatrace-data-${{ github.run_id }}
          restore-keys: boatrace-data-

      - name: Ensure data directory
        run: mkdir -p .boatrace-data

      - name: Predict today
        env:
          BOATRACE_SKIP_ODDS: '1'
        run: boatrace predict today --mode ml

      - name: Publish grades to note.com
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIES: ${{ secrets.NOTE_SESSION_COOKIES }}
        run: boatrace publish grades

      - name: Cool-down before premium
        run: sleep $(shuf -i 180-420 -n 1)

      - name: Publish S-rank paid articles
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIES: ${{ secrets.NOTE_SESSION_COOKIES }}
        run: boatrace publish premium
        timeout-minutes: 20
        continue-on-error: true

      - name: Tweet morning prediction
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: boatrace tweet morning
        continue-on-error: true

      - name: Follow note.com creators
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIES: ${{ secrets.NOTE_SESSION_COOKIES }}
        run: boatrace engage note-follow --max 5
        continue-on-error: true

      - name: Engage with community (morning)
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: boatrace engage auto --timing morning
        continue-on-error: true

      - name: Save data cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .boatrace-data
          key: boatrace-data-${{ github.run_id }}-morning

  midday:
    if: >-
      github.event.schedule == '0 4 * * *' ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'midday')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[ml]"
          pip install playwright
          playwright install chromium --with-deps

      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: .boatrace-data
          key: boatrace-data-${{ github.run_id }}
          restore-keys: boatrace-data-

      - name: Ensure data directory
        run: mkdir -p .boatrace-data

      - name: Fetch results
        run: boatrace results fetch

      - name: Check results
        run: boatrace results check

      - name: Check ROI
        run: boatrace roi check

      - name: Publish midday report
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIES: ${{ secrets.NOTE_SESSION_COOKIES }}
        run: boatrace publish midday

      - name: Tweet midday report
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: boatrace tweet midday
        continue-on-error: true

      - name: Save data cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .boatrace-data
          key: boatrace-data-${{ github.run_id }}-midday

  evening:
    if: >-
      github.event.schedule == '30 12 * * *' ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'evening')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[ml]"
          pip install playwright
          playwright install chromium --with-deps

      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: .boatrace-data
          key: boatrace-data-${{ github.run_id }}
          restore-keys: boatrace-data-

      - name: Ensure data directory
        run: mkdir -p .boatrace-data

      - name: Fetch results
        run: boatrace results fetch

      - name: Check results
        run: boatrace results check

      - name: Check ROI
        run: boatrace roi check

      - name: ROI today
        run: boatrace roi today

      - name: Publish results to note.com
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIES: ${{ secrets.NOTE_SESSION_COOKIES }}
        run: boatrace publish results

      - name: Cool-down before hit flash
        run: sleep $(shuf -i 120-300 -n 1)

      - name: Publish hit flash (if big win)
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIES: ${{ secrets.NOTE_SESSION_COOKIES }}
        run: boatrace publish hit-flash --min-payout 5000
        continue-on-error: true

      - name: Tweet hit announcements
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: boatrace tweet hit
        continue-on-error: true

      - name: Tweet daily summary
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: boatrace tweet daily
        continue-on-error: true

      - name: Engage with community (evening)
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: boatrace engage auto --timing evening
        continue-on-error: true

      - name: Save data cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .boatrace-data
          key: boatrace-data-${{ github.run_id }}-evening

  weekly-report:
    if: >-
      github.event.schedule == '0 15 * * 0' ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'weekly-report')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[ml]"
          pip install playwright
          playwright install chromium --with-deps

      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: .boatrace-data
          key: boatrace-data-${{ github.run_id }}
          restore-keys: boatrace-data-

      - name: Ensure data directory
        run: mkdir -p .boatrace-data

      - name: Publish track record
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_USER_ID: ${{ secrets.NOTE_USER_ID }}
          NOTE_SESSION_COOKIES: ${{ secrets.NOTE_SESSION_COOKIES }}
        run: boatrace publish track-record

      - name: Save data cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .boatrace-data
          key: boatrace-data-${{ github.run_id }}-weekly-report

  weekly-train:
    if: >-
      github.event.schedule == '0 18 * * 6' ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'train')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[ml]"

      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: .boatrace-data
          key: boatrace-data-${{ github.run_id }}
          restore-keys: boatrace-data-

      - name: Ensure data directory
        run: mkdir -p .boatrace-data

      - name: Train model
        run: boatrace train --days 365

      - name: Save data cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .boatrace-data
          key: boatrace-data-${{ github.run_id }}-train
